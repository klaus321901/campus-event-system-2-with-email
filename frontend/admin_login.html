<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Campus Connect</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>🔐 Admin Access</h2>
        <form id="adminLoginForm">
            <input type="password" id="adminPassword" placeholder="Enter Admin Password" required>
            <button type="submit" class="submit-btn" id="loginBtn">Unlock Panel</button>
        </form>
        <a href="/" class="back-link">← Cancel and Go Back</a>
    </div>

    <script>
        document.getElementById('adminLoginForm').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.textContent = "Verifying...";
            btn.disabled = true;

            try {
                const body = new URLSearchParams({
                    username: 'admin',
                    password: password
                });

                const res = await fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = '/';
                } else {
                    alert(data.detail || "Access Denied");
                    btn.textContent = "Unlock Panel";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Connection failed");
                btn.textContent = "Unlock Panel";
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
