<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Analytics | Campus Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-yellow: #f1c40f;
            --accent-blue: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stat-card {
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .chart-wrapper {
            position: relative;
            height: 250px;
            width: 100%;
        }

        .suggestions-list {
            list-style: none;
            padding: 0;
        }

        .suggestion-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-yellow);
            display: flex;
            align-items: center;
        }

        .suggestion-icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1 id="eventTitle">Loading Event...</h1>
                <div class="subtitle" id="eventDate">Analyze performance and feedback</div>
            </div>
            <a href="#" onclick="window.close()" class="btn-back">Close Tab</a>
        </header>

        <div id="loading" class="loading">Gathering data points...</div>

        <div id="dashboard" style="display: none;">
            <!-- KPI Row -->
            <div class="dashboard-grid">
                <div class="card stat-card">
                    <div class="stat-value" id="totalReviews">-</div>
                    <div class="stat-label">Total Reviews</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="avgRating" style="color: var(--accent-yellow);">-</div>
                    <div class="stat-label">Average Rating</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="sentimentScore" style="color: var(--accent-green);">-%</div>
                    <div class="stat-label">Positive Sentiment</div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="dashboard-grid">
                <div class="card">
                    <h3 style="margin-top: 0;">Sentiment Distribution</h3>
                    <div class="chart-wrapper">
                        <canvas id="sentimentChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-top: 0;">Trending Keywords</h3>
                    <div class="chart-wrapper">
                        <canvas id="keywordChart"></canvas>
                    </div>
                </div>
            </div>


        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000'; // Make sure this matches your backend

        async function init() {
            // Get Event ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');
            const eventTitle = urlParams.get('title');

            if (!eventId) {
                document.getElementById('eventTitle').textContent = "Error: No Event ID provided";
                return;
            }

            document.getElementById('eventTitle').textContent = eventTitle || `Event #${eventId}`;

            try {
                // Fetch Analysis Data
                const response = await fetch(`${API_URL}/events/${eventId}/analyze`, { method: 'POST' });
                const data = await response.json();

                // Fetch Basic Event Data for context (if needed, skipping for now to save calls)

                renderDashboard(data);
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = `<span style="color: var(--accent-red)">Failed to load data. Is the backend running?</span>`;
            }
        }

        function renderDashboard(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // 1. KPIs
            document.getElementById('totalReviews').textContent = data.total;

            // Calculate a rough average based on sentiment percentages
            // 5 stars for positive, 3 for neutral, 1 for negative
            const avg = (data.sentiment.positive * 5 + data.sentiment.neutral * 3 + data.sentiment.negative * 1) / 100;
            document.getElementById('avgRating').textContent = avg.toFixed(1);

            document.getElementById('sentimentScore').textContent = data.sentiment.positive + '%';

            // 2. Charts
            renderSentimentChart(data.sentiment);
            renderKeywordChart(data.keywords);


        }

        function renderSentimentChart(sentiment) {
            const ctx = document.getElementById('sentimentChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Positive', 'Neutral', 'Negative'],
                    datasets: [{
                        data: [sentiment.positive, sentiment.neutral, sentiment.negative],
                        backgroundColor: ['#2ecc71', '#f1c40f', '#e74c3c'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#f8fafc' } }
                    }
                }
            });
        }

        function renderKeywordChart(keywords) {
            // Mocking counts since backend currently returns valid list of words but not counts
            // In prod, backend should return {word: count}
            const labels = keywords;
            // Since backend currently returns just an array, we'll assume a frequency distribution
            // In a real scenario, this would come from the API
            const data = keywords.map((_, i) => keywords.length - i + 2);

            const ctx = document.getElementById('keywordChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Mentions',
                        data: data,
                        backgroundColor: '#3498db',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }



        init();
    </script>

</body>

</html>
